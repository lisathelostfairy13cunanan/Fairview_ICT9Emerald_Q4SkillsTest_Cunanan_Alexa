<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
    <title>Q4 Skills Test</title>
       
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Verdana', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: url(https://i.pinimg.com/736x/23/15/63/231563dd1037562741892017d8704f9a.jpg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            text-align: center;
        }
 
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
        }

        form {
            width: 350px;
            height: 550px; 
            border-radius: 15px;
            background-color: rgba(0,0,0,0.55);
            box-shadow: 2px 2px 2px rgba(0,0,0,0.32);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-bottom: 20px;
        }

        .inputs {
            padding: 30px 30px 10px 30px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border: 1px solid rgb(180,180,180);
            box-shadow: 1px 1px 1px rgba(0,0,0,0.41);
            outline: none;
        }

        .checkb {
            text-align: left;
            padding-left: 30px;
            margin-bottom: 10px;
        }

        #answer {
            color: #ffbaba;
            font-size: 12px;
            min-height: 16px;
            font-weight: 800;
            margin: 5px 0;
        }

        .footer {
            padding: 0 30px;
            margin-top: 5px;
        }

        .footer button, 
        .footer input[type="reset"] {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background-color: rgb(187, 142, 142);
            color: white;
            cursor: pointer;
            font-size: 16px;
            appearance: none;
            display: block;
        }

        .footer button:hover,
        .footer input[type="reset"]:hover {
            filter: brightness(0.8);
        }
        
        .footer button:disabled {
            background-color: #666;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    
    <div class="container">
        <form id="loginForm">
            <div class="header">
                <h1>LOG IN</h1>
            </div>

            <div class="inputs">
                <label for="username">Username</label><br>
                <input type="text" id="username" placeholder="spidermanz15" required><br><br>

                <label for="password">Password</label><br>
                <input type="password" id="password" placeholder="Zpidey13" required>
            </div>

            <div class="checkb">
                <input type="checkbox" id="checkboxID">
                <label for="checkboxID">Remember</label>
            </div>

            <p id="answer"></p>

            <div class="footer">
                <button type="button" id="loginbutton" onclick="authenticate()">Log In</button>
            </div> 

            <div class="footer">
                <input type="reset" id="cancel" value="Cancel" onclick="clearMessage()">
            </div>
        </form>
    </div>

    <script>
        let attempt_counter = 0;

        function clearMessage() {
            // Clears the "Incorrect" message when Cancel is pressed
            document.getElementById("answer").innerHTML = "";
        }

        function authenticate() {
            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;
            let answerDisplay = document.getElementById("answer");

            let granted = "Welcome " + username + "!";
            let denied = "Access denied! Account locked after 3 attempts.";

            if (username === "spidermanz15" && password === "Zpidey13") {
                alert(granted);
                attempt_counter = 0;
                answerDisplay.innerHTML = "";
                window.location.href = "notebooks.html";
            } else {
                attempt_counter++;
                answerDisplay.innerHTML = "Incorrect username or password. Attempt " + attempt_counter + " of 3";
            }

            if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("loginbutton").disabled = true;
                document.getElementById("username").disabled = true;
                document.getElementById("password").disabled = true;
            }
        }
    </script>
</body>
</html>
