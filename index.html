<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
    <title>Q4 Skills Test</title>
       
 <style>
        * {
            box-sizing: border-box;
            font-family: 'Verdana', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: url(https://i.pinimg.com/736x/23/15/63/231563dd1037562741892017d8704f9a.jpg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            text-align: center;
        }
 
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
        }

        form {
            width: 350px;
            height: 520px;
            border-radius: 15px;
            background-color: rgba(0,0,0,0.55);
            box-shadow: 2px 2px 2px rgba(0,0,0,0.32);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .inputs {
            padding: 30px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 5px;
            margin: 5px 0;
            border-radius: 5px;
            border: 1px solid rgb(180,180,180);
            box-shadow: 1px 1px 1px rgba(0,0,0,0.41);
            outline: none;
        }

        .checkb {
            margin: -10px 0 10px 0;
            text-align: left;
            padding-left: 25px;
        }

        #display {
            color: white;
            font-size: 12px;
            min-height: 16px;
            margin-bottom: 10px;
            font-weight: 800;
            font-style: italic;
        }

        .footer {
            text-align: center;
            padding: 0 25px 20px 25px;
        }

        .footer button {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background-color: rgb(187, 142, 142);
            color: white;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    
       <div class="container">
        <form>
            <div class="header">
                <h1>LOG IN</h1>
                <div class="Q1">                     
                </div>
            </div>

            <div class="inputs">
                <label for="uname">Username</label><br>
                <input type="text" id="username" placeholder="spidermanz15" required><br>

                <label for="pwd">Password</label><br>
                <input type="password" id="password" placeholder="Zpidey13" required>
            </div>

            <div class="checkb">
                <input type="checkbox" id="checkboxID" onclick="checkBox()">
                <label for="checkboxID">Remember</label>
            </div>

            <p id="answer"></p>

            <div class="footer">
                <button type="button" id="loginbutton" onclick="authenticate()">Log In</button>
            </div>

        </form>
    </div>>


    <script>

        let attempt_counter = 0;

        function authenticate() {

            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;

            let granted = "Welcome " + username + "!";
            let denied = "Access denied! Account locked after 3 attempts. Please try again after 1 hour.";

            while (attempt_counter < 3) {


                if (username === "spidermanz15" && password === "Zpidey13") {
                    alert(granted);
                    attempt_counter = 0;

                    document.getElementById("answer").innerHTML = "";

                    window.location.href = "notebooks.html";

                    break;
                }

                else {
                    attempt_counter++;

                    document.getElementById("answer").innerHTML =
                        "Incorrect username or password. Attempt " + attempt_counter + " of 3";

                    break;
                }
                  }

            if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("loginbutton").disabled = true;
            }
        }
    </script>
</body>
</html>
